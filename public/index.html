<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Task Manager</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      width: 100%;
      max-width: 560px;
    }

    h1 {
      font-size: 1.8rem;
      color: #1a1a2e;
      margin-bottom: 24px;
      text-align: center;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      margin-bottom: 24px;
    }

    .card h2 {
      font-size: 1rem;
      color: #555;
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input[type="text"], textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 0.95rem;
      margin-bottom: 10px;
      outline: none;
      transition: border 0.2s;
    }

    input[type="text"]:focus, textarea:focus {
      border-color: #4f8ef7;
    }

    textarea { resize: none; height: 70px; }

    button.btn-add {
      width: 100%;
      padding: 11px;
      background: #4f8ef7;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    button.btn-add:hover { background: #3a7ae0; }

    .task-list { list-style: none; }

    .task-list li {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 14px 0;
      border-bottom: 1px solid #f0f0f0;
      gap: 12px;
    }

    .task-list li:last-child { border-bottom: none; }

    .task-info { flex: 1; }

    .task-title {
      font-size: 0.97rem;
      color: #1a1a2e;
      font-weight: 600;
    }

    .task-desc {
      font-size: 0.85rem;
      color: #888;
      margin-top: 3px;
    }

    .task-date {
      font-size: 0.75rem;
      color: #bbb;
      margin-top: 4px;
    }

    button.btn-delete {
      background: none;
      border: none;
      color: #e05555;
      cursor: pointer;
      font-size: 1.1rem;
      padding: 4px 6px;
      border-radius: 6px;
      transition: background 0.15s;
      flex-shrink: 0;
    }

    button.btn-delete:hover { background: #fdeaea; }

    .empty {
      text-align: center;
      color: #bbb;
      font-size: 0.9rem;
      padding: 20px 0;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: #fff;
      padding: 10px 22px;
      border-radius: 8px;
      font-size: 0.88rem;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }

    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Task Manager</h1>

    <div class="card">
      <h2>Add Task</h2>
      <input type="text" id="title" placeholder="Task title" />
      <textarea id="description" placeholder="Description (optional)"></textarea>
      <button class="btn-add" onclick="addTask()">Add Task</button>
    </div>

    <div class="card">
      <h2>Tasks</h2>
      <ul class="task-list" id="task-list">
        <li class="empty">Loading...</li>
      </ul>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    async function loadTasks() {
      const res = await fetch('/tasks');
      const tasks = await res.json();
      const list = document.getElementById('task-list');

      if (tasks.length === 0) {
        list.innerHTML = '<li class="empty">No tasks yet. Add one above!</li>';
        return;
      }

      list.innerHTML = tasks.map(t => `
        <li>
          <div class="task-info">
            <div class="task-title">${escape(t.title)}</div>
            ${t.description ? `<div class="task-desc">${escape(t.description)}</div>` : ''}
            <div class="task-date">${new Date(t.createdAt).toLocaleString()}</div>
          </div>
          <button class="btn-delete" onclick="deleteTask('${t.id}')" title="Delete">&#x2715;</button>
        </li>
      `).join('');
    }

    async function addTask() {
      const title = document.getElementById('title').value.trim();
      const description = document.getElementById('description').value.trim();

      if (!title) { showToast('Title is required'); return; }

      const res = await fetch('/tasks', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, description })
      });

      if (res.ok) {
        document.getElementById('title').value = '';
        document.getElementById('description').value = '';
        showToast('Task added!');
        loadTasks();
      }
    }

    async function deleteTask(id) {
      await fetch(`/tasks/${id}`, { method: 'DELETE' });
      showToast('Task deleted');
      loadTasks();
    }

    function escape(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    loadTasks();
  </script>
</body>
</html>
