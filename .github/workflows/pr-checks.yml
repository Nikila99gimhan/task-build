name: PR Security Checks

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-checks-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  gitleaks:
    name: Gitleaks — Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trivy:
    name: Trivy — Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 0
          ignore-unfixed: true
          format: table
          output: trivy-fs-results.txt

      - name: Run Trivy Dockerfile scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: Dockerfile
          severity: CRITICAL,HIGH
          exit-code: 0
          format: table
          output: trivy-dockerfile-results.txt

      - name: Comment PR with scan results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const fsResults = fs.existsSync('trivy-fs-results.txt') 
              ? fs.readFileSync('trivy-fs-results.txt', 'utf8') 
              : 'Scan did not produce output';
            const dockerResults = fs.existsSync('trivy-dockerfile-results.txt') 
              ? fs.readFileSync('trivy-dockerfile-results.txt', 'utf8') 
              : 'Scan did not produce output';
            
            const fsClean = !fsResults.includes('FAIL') && !fsResults.includes('Total: ');
            const dockerClean = !dockerResults.includes('FAILURES: ') || dockerResults.includes('FAILURES: 0');
            
            const fsIcon = fsClean ? '✅' : '❌';
            const dockerIcon = dockerClean ? '✅' : '❌';
            
            const body = `## 🔒 Trivy Security Scan Results
            
            ### ${fsIcon} Filesystem scan (npm dependencies)
            \`\`\`
            ${fsResults.trim() || 'No vulnerabilities found'}
            \`\`\`
            
            ### ${dockerIcon} Dockerfile scan (container configuration)
            \`\`\`
            ${dockerResults.trim() || 'No misconfigurations found'}
            \`\`\`
            
            ---
            _Severity threshold: HIGH and CRITICAL · [Workflow run](${context.payload.pull_request.html_url}/checks)_
            `;
            
            // Find existing comment to update (avoid spam on each push)
            const comments = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo
            });
            
            const existing = comments.data.find(c => 
              c.user.type === 'Bot' && c.body.includes('🔒 Trivy Security Scan Results')
            );
            
            if (existing) {
              await github.rest.issues.updateComment({
                comment_id: existing.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            }

      - name: Add to job summary
        if: always()
        run: |
          echo "## 🔒 Trivy Security Scan" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Filesystem scan" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat trivy-fs-results.txt >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "No output"
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Dockerfile scan" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat trivy-dockerfile-results.txt >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "No output"
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Fail check if vulnerabilities found
        run: |
          FAIL=0
          if grep -E "FAILURES: [1-9]|Total: [1-9]" trivy-fs-results.txt 2>/dev/null; then
            echo "❌ Filesystem scan found vulnerabilities"
            FAIL=1
          fi
          if grep -E "FAILURES: [1-9]" trivy-dockerfile-results.txt 2>/dev/null; then
            echo "❌ Dockerfile scan found misconfigurations"
            FAIL=1
          fi
          if [ $FAIL -eq 1 ]; then
            echo ""
            echo "See PR comment or job summary for details."
            exit 1
          fi
          echo "✅ All scans passed"

  pr-checks:
    name: PR Metadata
    runs-on: ubuntu-latest
    steps:
      - name: Verify PR title follows convention
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            docs
            refactor
            test
            ci
            perf
