name: PR Security Checks

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

# Cancel in-progress runs when a new commit is pushed to the PR
concurrency:
  group: pr-checks-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  # ────────────────────────────────────────────
  # Job 1 — Secrets scan with Gitleaks
  # ────────────────────────────────────────────
  gitleaks:
    name: Gitleaks — Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for commit-by-commit scan

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config-path: .gitleaks.toml

  # ────────────────────────────────────────────
  # Job 2 — Vulnerability scan with Trivy
  # ────────────────────────────────────────────
  trivy:
    name: Trivy — Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true
          format: table

      - name: Run Trivy Dockerfile scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: Dockerfile
          severity: CRITICAL,HIGH
          exit-code: 1
          format: table

  # ────────────────────────────────────────────
  # Job 3 — PR metadata check (lightweight, fast)
  # ────────────────────────────────────────────
  pr-checks:
    name: PR Metadata
    runs-on: ubuntu-latest
    steps:
      - name: Verify PR title follows convention
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            docs
            refactor
            test
            ci
            perf
